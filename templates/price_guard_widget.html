<!-- ═══════════════════════════════════════════════════════════
     PRICE GUARD WIDGET
     DROP THIS into home.html, right after the </section> that
     closes the .hero-section and BEFORE the .main-layout div.
     ═══════════════════════════════════════════════════════════ -->

<section class="price-guard-section">
    <div class="pg-inner">
        <div class="pg-header">
            <div class="pg-title-row">
                <div class="pg-icon">🛡️</div>
                <div>
                    <h2 class="pg-title">Price Guard</h2>
                    <p class="pg-subtitle">Know the fair price before you pay</p>
                </div>
                <div class="pg-badge">LIVE</div>
            </div>
            <div class="pg-search-row">
                <input class="pg-input" id="pgSearch" type="text"
                       placeholder="Search: salon, mechanic, food…"
                       oninput="pgFilter(this.value)">
                <button class="pg-btn" onclick="pgFilter(document.getElementById('pgSearch').value)">
                    Check Price
                </button>
            </div>
        </div>

        <div class="pg-results" id="pgResults">
            <!-- Populated by JS -->
            <div class="pg-loading">Loading market prices…</div>
        </div>

        <p class="pg-disclaimer">
            Averages calculated from prices submitted by local businesses.
            Updated automatically as new businesses join.
        </p>
    </div>
</section>

<style>
/* ── PRICE GUARD WIDGET ── */
.price-guard-section {
    background: white;
    border-top: 1px solid #e8eaf0;
    border-bottom: 1px solid #e8eaf0;
    padding: 24px 18px;
}
.pg-inner { max-width: 1160px; margin: 0 auto; }
.pg-header { margin-bottom: 18px; }
.pg-title-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.pg-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #2b7a78, #14a8ac);
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
}
.pg-title {
    font-size: 17px; font-weight: 800; color: #1f2937; margin: 0;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
}
.pg-subtitle { font-size: 12px; color: #6b7280; margin: 0; }
.pg-badge {
    margin-left: auto;
    background: #dcfce7; color: #16a34a;
    font-size: 10px; font-weight: 800;
    padding: 3px 9px; border-radius: 100px;
    letter-spacing: 1px;
    animation: blink-badge 2s ease infinite;
}
@keyframes blink-badge { 0%,100%{opacity:1} 50%{opacity:.5} }
.pg-search-row { display: flex; gap: 8px; }
.pg-input {
    flex: 1; padding: 10px 14px; font-size: 14px;
    border: 1.5px solid #e5e7eb; border-radius: 9px;
    outline: none; font-family: inherit; background: #fafafa;
    transition: border-color .2s;
}
.pg-input:focus { border-color: #2b7a78; box-shadow: 0 0 0 3px rgba(43,122,120,.1); background: white; }
.pg-btn {
    background: #2b7a78; color: white;
    border: none; padding: 10px 20px; border-radius: 9px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: background .2s; white-space: nowrap;
}
.pg-btn:hover { background: #205e5c; }

.pg-results {
    display: flex; gap: 10px; overflow-x: auto;
    padding-bottom: 6px; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
}
.pg-results::-webkit-scrollbar { display: none; }
.pg-loading { color: #9ca3af; font-size: 13px; padding: 8px 0; }
.pg-empty  { color: #9ca3af; font-size: 13px; padding: 8px 0; }

/* PRICE CARD */
.pg-card {
    background: #f4f6fb; border: 1.5px solid #e8eaf0;
    border-radius: 12px; padding: 14px 16px;
    min-width: 185px; max-width: 210px; flex-shrink: 0;
    transition: border-color .2s, transform .18s;
    cursor: default;
}
.pg-card:hover { border-color: #2b7a78; transform: translateY(-2px); }
.pg-card.best-value {
    border-color: #f59e0b;
    background: linear-gradient(135deg, #fffbeb, #fef3c7);
}
.pg-card-cat {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: #2b7a78;
    margin-bottom: 4px;
}
.pg-card.best-value .pg-card-cat { color: #d97706; }
.pg-card-label {
    font-size: 13px; font-weight: 600; color: #374151;
    margin-bottom: 10px; line-height: 1.4;
}
.pg-card-avg {
    font-size: 22px; font-weight: 900; color: #1f2937;
    line-height: 1; margin-bottom: 3px;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
}
.pg-card-avg span { font-size: 12px; font-weight: 600; color: #6b7280; }
.pg-card-count {
    font-size: 11px; color: #9ca3af; font-weight: 500;
}
.pg-card-tag {
    display: inline-block; margin-top: 8px;
    background: #f59e0b; color: white;
    font-size: 10px; font-weight: 800;
    padding: 2px 8px; border-radius: 100px;
}

/* NO DATA CARD */
.pg-cta-card {
    background: linear-gradient(135deg, #f0faf9, #e8f7f7);
    border: 1.5px dashed #a7d8d6;
    border-radius: 12px; padding: 14px 16px;
    min-width: 185px; flex-shrink: 0;
    display: flex; flex-direction: column; justify-content: center;
    text-align: center;
}
.pg-cta-card p { font-size: 12px; color: #4b8b8a; line-height: 1.5; margin-bottom: 8px; }
.pg-cta-card a {
    display: inline-block; background: #2b7a78; color: white;
    font-size: 12px; font-weight: 700; padding: 7px 12px;
    border-radius: 7px; text-decoration: none; transition: background .2s;
}
.pg-cta-card a:hover { background: #205e5c; }

.pg-disclaimer {
    font-size: 11px; color: #9ca3af; margin-top: 12px;
    text-align: center; line-height: 1.5;
}

@media(max-width:600px) {
    .price-guard-section { padding: 18px 14px; }
    .pg-card { min-width: 160px; }
}
</style>

<script>
var pgAllData = [];

// Load price data from the API
fetch('/price-guard')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        pgAllData = data;
        pgRender(data);
    })
    .catch(function() {
        document.getElementById('pgResults').innerHTML =
            '<div class="pg-empty">Price data loading…</div>';
    });

function pgFilter(query) {
    query = (query || '').toLowerCase().trim();
    if (!query) {
        pgRender(pgAllData);
        return;
    }
    var filtered = pgAllData.filter(function(d) {
        return d.category.includes(query) || d.label.toLowerCase().includes(query);
    });
    pgRender(filtered, query);
}

function pgRender(data, query) {
    var el = document.getElementById('pgResults');
    if (!data || data.length === 0) {
        var q = query || 'this category';
        el.innerHTML =
            '<div class="pg-cta-card">' +
            '<p>No price data for <strong>' + q + '</strong> yet.<br>Be the first to add your price!</p>' +
            '<a href="/add-business">+ Add Your Business</a>' +
            '</div>';
        return;
    }

    var html = '';
    data.slice(0, 12).forEach(function(d, i) {
        var isBest = i === 0 && d.count >= 3;
        var formatted = 'UGX ' + Number(d.average).toLocaleString();
        html +=
            '<div class="pg-card' + (isBest ? ' best-value' : '') + '">' +
            '<div class="pg-card-cat">' + d.category + '</div>' +
            '<div class="pg-card-label">' + d.label + '</div>' +
            '<div class="pg-card-avg">' + formatted.replace('UGX ', '') + ' <span>UGX</span></div>' +
            '<div class="pg-card-count">Based on ' + d.count + ' shop' + (d.count !== 1 ? 's' : '') + '</div>' +
            (isBest ? '<div class="pg-card-tag">Most Reported</div>' : '') +
            '</div>';
    });

    // Always show "Add your business" card at the end
    html +=
        '<div class="pg-cta-card">' +
        '<p>Your business here.<br>Add your price and get found.</p>' +
        '<a href="/add-business">+ Add Yours</a>' +
        '</div>';

    el.innerHTML = html;
}
</script>
