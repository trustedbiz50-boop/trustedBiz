<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Login — TrustedBiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #1a1d2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .box {
        background: white;
        border-radius: 16px;
        padding: 40px 36px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
        text-align: center;
        margin-bottom: 28px;
    }
    .logo-icon {
        width: 56px; height: 56px;
        background: #e8f7f7;
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 14px;
    }
    .logo-icon svg { width: 28px; height: 28px; color: #2b7a78; stroke: #2b7a78; }
    .logo h2 { font-size: 20px; font-weight: 800; color: #1f2937; margin-bottom: 4px; }
    .logo p  { font-size: 13px; color: #6b7280; }
    .flash {
        background: #fee2e2; border: 1.5px solid #dc2626;
        color: #991b1b; padding: 10px 14px; border-radius: 8px;
        font-size: 13px; margin-bottom: 16px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
        display: block; font-size: 13px; font-weight: 600;
        color: #374151; margin-bottom: 6px;
    }
    .form-group input {
        width: 100%; padding: 11px 14px; font-size: 14px;
        border: 1.5px solid #e5e7eb; border-radius: 8px;
        outline: none; font-family: inherit; background: #fafafa;
        transition: border-color .2s;
    }
    .form-group input:focus {
        border-color: #2b7a78;
        box-shadow: 0 0 0 3px rgba(43,122,120,.12);
        background: white;
    }
    .submit-btn {
        width: 100%; padding: 13px; background: #2b7a78; color: white;
        font-size: 15px; font-weight: 700; border: none; border-radius: 8px;
        cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .submit-btn:hover { background: #205e5c; }
    .back { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #6b7280; text-decoration: none; }
    .back:hover { color: #2b7a78; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
        </div>
        <h2>Admin Panel</h2>
        <p>TrustedBiz — Owner Access Only</p>
    </div>

    {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Admin Password</label>
            <input type="password" name="admin_pass" placeholder="Enter your admin password" required autofocus>
        </div>
        <button type="submit" class="submit-btn">Enter Admin Panel</button>
    </form>
    <a href="/" class="back">← Back to TrustedBiz</a>
</div>
</body>
</html>
