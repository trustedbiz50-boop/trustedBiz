<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TrustedBiz{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
    <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f6fb; }

    header {
        background: white; padding: 14px 30px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        display: flex; justify-content: space-between; align-items: center;
        position: sticky; top: 0; z-index: 500;
    }
    header h1 { margin: 0; font-size: 22px; color: #1f2937; }
    header a {
        text-decoration: none; font-weight: 600; color: #2b7a78;
        font-size: 14px; padding: 7px 14px;
        border: 1.5px solid #2b7a78; border-radius: 8px;
        transition: background .2s, color .2s;
    }
    header a:hover { background: #2b7a78; color: white; }

    footer {
        background: white; border-top: 1px solid #e5e7eb;
        text-align: center; padding: 20px; color: #9ca3af; font-size: 13px;
    }
    footer p { margin: 3px 0; }
    footer a { color: #2b7a78; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media(max-width:600px){
        header { padding: 12px 16px; }
    }
    </style>
</head>
<body>

<header>
    <h1>TrustedBiz</h1>
    {% block header_link %}<a href="/">← Home</a>{% endblock %}
</header>

{% block body %}{% endblock %}

<footer>
    <p>© 2025 TrustedBiz · Connecting Uganda's trusted businesses</p>
    <p>
        <a href="/privacy">Privacy Policy</a> &nbsp;·&nbsp;
        <a href="/terms">Terms of Service</a>
    </p>
    <p style="margin-top:8px; font-size:12px;">
        Pay via <strong>MTN MoMo</strong> or <strong>Airtel Money</strong>
    </p>
</footer>

{% block extra_scripts %}{% endblock %}
</body>
</html>
