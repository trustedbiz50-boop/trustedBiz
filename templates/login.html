<!DOCTYPE html>
<html>
<head>
    <title>Login — TrustedBiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        background: #f4f6fb;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* HEADER */
    header {
        background: white;
        padding: 14px 30px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    header h1 { margin: 0; font-size: 22px; color: #1f2937; }
    header a {
        text-decoration: none;
        font-weight: 600;
        color: #2b7a78;
        font-size: 14px;
    }

    /* PAGE */
    .auth-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .auth-box {
        background: white;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 40px 36px;
        width: 100%;
        max-width: 420px;
        border: 1.5px solid #f0f0f0;
    }

    .auth-logo {
        text-align: center;
        margin-bottom: 28px;
    }
    .auth-logo .logo-icon {
        width: 52px; height: 52px;
        background: linear-gradient(135deg, #085255, #0f9397);
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 12px;
    }
    .auth-logo .logo-icon svg { width: 26px; height: 26px; color: white; }
    .auth-logo h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1f2937;
        margin: 0 0 4px;
    }
    .auth-logo p {
        font-size: 14px;
        color: #6b7280;
        margin: 0;
    }

    /* FLASH */
    .flash {
        background: #fef3c7;
        border: 1.5px solid #f59e0b;
        color: #92400e;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 18px;
    }
    .flash.error {
        background: #fee2e2;
        border-color: #dc2626;
        color: #991b1b;
    }

    /* FORM */
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
    }
    .form-group input {
        width: 100%;
        padding: 11px 14px;
        font-size: 14px;
        border: 1.5px solid #e5e7eb;
        border-radius: 8px;
        outline: none;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
        transition: border-color .2s, box-shadow .2s;
        background: #fafafa;
    }
    .form-group input:focus {
        border-color: #2b7a78;
        box-shadow: 0 0 0 3px rgba(43,122,120,0.12);
        background: white;
    }

    .submit-btn {
        width: 100%;
        padding: 13px;
        background: #2b7a78;
        color: white;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background .2s, transform .15s;
        margin-top: 6px;
        font-family: 'Segoe UI', sans-serif;
    }
    .submit-btn:hover {
        background: #205e5c;
        transform: translateY(-1px);
    }

    .auth-footer {
        text-align: center;
        margin-top: 22px;
        font-size: 14px;
        color: #6b7280;
    }
    .auth-footer a {
        color: #2b7a78;
        font-weight: 600;
        text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    @media(max-width: 480px) {
        .auth-box { padding: 28px 20px; }
    }
    </style>
</head>
<body>

<header>
    <h1>TrustedBiz</h1>
    <a href="/">← Home</a>
</header>

<div class="auth-page">
    <div class="auth-box">

        <div class="auth-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <polyline points="9 12 11 14 15 10"/>
                </svg>
            </div>
            <h2>Welcome back</h2>
            <p>Login to manage your business</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one free</a>
        </div>

    </div>
</div>

</body>
</html>
